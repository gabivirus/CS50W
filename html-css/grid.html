<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hello!</title>
        <style>
            #grid{
                display: grid;
                color: white;
                background-color: darkgreen;
                padding: 10px;
                margin: 10px;
                grid-column-gap: 20px;
                grid-row-gap: 10px;
                grid-template-columns: 200px auto 100px;
            }
            #grid > div{
                background-color: aliceblue;
                color: black;
                text-align: center;
            }
        </style>
    </head>
    <body>
       <div id="grid">
            
            <div>1. this is sample text</div>
            <div>2. this is sample text</div>
            <div>3. this is sample text</div>
            <div>4. this is sample text</div>
            <div>5. this is sample text</div>
            <div>6. this is sample text</div>
            <div>7. this is sample text</div>
        </div>
    </body>
</html>
